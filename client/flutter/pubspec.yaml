name: rdcs_client
description: RDCS Remote Desktop Control System - Desktop Client

publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  ffi: ^2.1.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.0
  window_manager: ^0.4.0
  tray_manager: ^0.3.0
  web_socket_channel: ^3.0.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.png

name: Build macOS Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          # macos-14 deprecation begins July 2026; use macos-15 (arm64)
          - runner: macos-15
            arch: arm64
            rust-target: aarch64-apple-darwin

          # macos-13 was retired December 2025; use macos-15-intel for x86_64
          - runner: macos-15-intel
            arch: x64
            rust-target: x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: |
          cd client/flutter
          flutter pub get

      - name: Build Rust FFI
        run: |
          cargo build --release \
            --target ${{ matrix.rust-target }} \
            --package rdcs-ffi

      - name: Build Flutter app
        run: |
          cd client/flutter
          flutter build macos --release

      - name: Copy and fix Rust library
        run: |
          set -x  # Enable debug output

          SRC_LIB="target/${{ matrix.rust-target }}/release/librdcs_core.dylib"
          APP_BUNDLE="client/flutter/build/macos/Build/Products/Release/rdcs_client.app"
          DEST_DIR="$APP_BUNDLE/Contents/Frameworks"
          DEST_LIB="$DEST_DIR/librdcs_core.dylib"

          echo "=== Checking source library ==="
          ls -lh "$SRC_LIB" || { echo "❌ Source library not found: $SRC_LIB"; exit 1; }

          echo "=== Checking app bundle ==="
          ls -ld "$APP_BUNDLE" || { echo "❌ App bundle not found: $APP_BUNDLE"; exit 1; }

          echo "=== Copying Rust library for ${{ matrix.arch }} ==="
          mkdir -p "$DEST_DIR"
          cp -v "$SRC_LIB" "$DEST_LIB"

          echo "=== Fixing install_name ==="
          install_name_tool -id "@rpath/librdcs_core.dylib" "$DEST_LIB"

          echo "=== Verifying ==="
          otool -D "$DEST_LIB"
          file "$DEST_LIB"
          ls -lh "$DEST_LIB"

      - name: Verify library install_name
        run: |
          DYLIB="client/flutter/build/macos/Build/Products/Release/rdcs_client.app/Contents/Frameworks/librdcs_core.dylib"
          echo "Verifying install_name for ${{ matrix.arch }}..."
          otool -D "$DYLIB"
          INSTALL_NAME=$(otool -D "$DYLIB" | tail -1)
          if [ "$INSTALL_NAME" != "@rpath/librdcs_core.dylib" ]; then
            echo "❌ install_name verification failed: $INSTALL_NAME"
            exit 1
          fi
          echo "✅ install_name correct: $INSTALL_NAME"

      - name: Package DMG
        run: ./scripts/package_macos.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdcs-client-macos-${{ matrix.arch }}
          path: rdcs_client-${{ matrix.arch }}-*.dmg

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: rdcs_client-${{ matrix.arch }}-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

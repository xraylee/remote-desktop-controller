# STUN/TURN Server Configuration
# For coturn server (https://github.com/coturn/coturn)

# Listening port for STUN/TURN
listening-port=3478
alt-listening-port=3479

# Relay ports range for TURN
min-port=49152
max-port=65535

# Authentication
lt-cred-mech
realm=rdcs.io

# Static user credentials (for testing)
# Format: username:password
user=rdcs-user:rdcs-test-password

# Bandwidth limits (free tier)
max-bps=2000000           # 2 Mbps max
bps-capacity=4000000      # 4 Mbps burst capacity

# Session limits
user-quota=10             # Max 10 sessions per user
total-quota=100           # Max 100 total sessions

# External IP (will be auto-detected if not set)
# external-ip=1.2.3.4

# Logging
log-file=/var/log/turnserver.log
verbose

# Security
fingerprint
no-tlsv1
no-tlsv1_1

# Disable multicast (not needed for RDCS)
no-multicast-peers

# Disable CLI (for production)
no-cli

# Enable STUN only mode (comment out for TURN)
# stun-only

# Disable TCP relay (UDP only for performance)
# no-tcp-relay

# Prometheus metrics (optional)
# prometheus

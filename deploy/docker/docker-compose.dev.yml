# RDCS - Docker Compose Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Or simply: make dev

x-dev-logging: &dev-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ===========================================
  # Signaling Server - cargo-watch hot-reload
  # ===========================================
  signaling:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.signaling.dev
    volumes:
      - ../../crates:/app/crates
    environment:
      RUST_LOG: debug
      RDCS_BIND_ADDR: "0.0.0.0:8443"
      RDCS_REDIS_URL: redis://redis:6379
      RDCS_HMAC_SECRET: ${RELAY_HMAC_SECRET:-dev_hmac_secret_change_in_prod}
      RDCS_RELAY_NODES: '[{"addr":"relay","port":3478,"region":"local","max_sessions":48}]'
      RDCS_LOG_LEVEL: debug
    restart: "no"
    <<: *dev-logging

  # ===========================================
  # Relay Server - cargo-watch hot-reload
  # ===========================================
  relay:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.relay.dev
    volumes:
      - ../../crates:/app/crates
    environment:
      RUST_LOG: debug
      RELAY_HMAC_SECRET: ${RELAY_HMAC_SECRET:-dev_hmac_secret_change_in_prod}
      RELAY_MIN_PORT: "49152"
      RELAY_MAX_PORT: "49200"
    restart: "no"
    <<: *dev-logging

  # ===========================================
  # Management API - air hot-reload
  # ===========================================
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api.dev
    volumes:
      - ../../services/api:/app
    environment:
      LOG_LEVEL: debug
      SKIP_TOTP: "true"
      DATABASE_URL: postgres://rdcs:${POSTGRES_PASSWORD:-rdcs_dev}@postgres:5432/rdcs?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_ISSUER: ${JWT_ISSUER:-rdcs-api}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    restart: "no"
    <<: *dev-logging

  # ===========================================
  # Web Admin Console - Vite HMR
  # ===========================================
  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web.dev
    volumes:
      - ../../web/admin/src:/app/src
      - ../../web/admin/public:/app/public
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    restart: "no"
    <<: *dev-logging

  # ===========================================
  # PostgreSQL - auto-init from migrations/
  # ===========================================
  postgres:
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../migrations/postgres:/docker-entrypoint-initdb.d
    restart: "no"
    <<: *dev-logging

  # ===========================================
  # Redis
  # ===========================================
  redis:
    restart: "no"
    <<: *dev-logging

  # ===========================================
  # MinIO
  # ===========================================
  minio:
    restart: "no"
    <<: *dev-logging

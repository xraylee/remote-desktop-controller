# RDCS - Docker Compose Base Configuration
# This is the base layer. Override with docker-compose.dev.yml or docker-compose.prod.yml.
# Usage:
#   Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ===========================================
  # Signaling Server (Rust) - WebSocket signaling
  # ===========================================
  signaling:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.signaling
    container_name: rdcs-signaling
    restart: unless-stopped
    ports:
      - "${SIGNALING_PORT:-8443}:8443"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      REDIS_URL: redis://redis:6379
      SIGNALING_PORT: "8443"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rdcs-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8443 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===========================================
  # Relay Server (Rust) - UDP media relay
  # ===========================================
  relay:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.relay
    container_name: rdcs-relay
    restart: unless-stopped
    ports:
      - "${RELAY_STUN_PORT:-3478}:3478/udp"
      - "49152-49200:49152-49200/udp"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      RELAY_SLOTS: "48"
      RELAY_MIN_PORT: "49152"
      RELAY_MAX_PORT: "49200"
    networks:
      - rdcs-net
    healthcheck:
      test: ["CMD-SHELL", "nc -zu localhost 3478 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===========================================
  # Management API (Go) - REST API server
  # ===========================================
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    container_name: rdcs-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: rdcs
      DB_PASSWORD: ${POSTGRES_PASSWORD:-rdcs_dev}
      DB_NAME: rdcs
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rdcs-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ===========================================
  # Web Admin Console (React + nginx)
  # ===========================================
  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    container_name: rdcs-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - rdcs-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ===========================================
  # PostgreSQL - Primary database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: rdcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rdcs
      POSTGRES_USER: rdcs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rdcs_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../migrations/postgres:/docker-entrypoint-initdb.d
    networks:
      - rdcs-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdcs -d rdcs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # Redis - Session cache & real-time state
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: rdcs-redis
    restart: unless-stopped
    command: >
      redis-server
      --notify-keyspace-events Ex
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - rdcs-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ===========================================
  # MinIO - S3-compatible object storage
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: rdcs-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - rdcs-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===========================================
  # MinIO Init - Create buckets (one-shot)
  # ===========================================
  minio-init:
    image: minio/mc:latest
    container_name: rdcs-minio-init
    entrypoint: /init-minio.sh
    volumes:
      - ./init-minio.sh:/init-minio.sh:ro
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - rdcs-net
    profiles:
      - init

networks:
  rdcs-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
